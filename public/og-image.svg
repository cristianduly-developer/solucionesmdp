  <line x1="100" y1="530" x2="1100" y2="530" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <text x="600" y="562" font-family="system-ui, sans-serif" font-size="15" fill="#475569" text-anchor="middle">28 días gratis · Desde $25.000/mes · Sin tarjeta de crédito</text>
